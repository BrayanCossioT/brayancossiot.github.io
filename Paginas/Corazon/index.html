<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corazón Animado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
        }
        canvas {
            display: block;
            margin: auto;
        }
        h1 {
            color: red;
            font-size: 36px;
        }
        .equation {
            font-size: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>¿Quieres ser mi crush?</h1>
    <p class="equation">(x²)^(1/3) + 0.7 · sin(k · x) · sqrt(3 - x²)</p>
    <p id="k-value">k = 0.00</p>
    <script>
        let k = 0; // Valor inicial de k
        let kSpeed = 0.05; // Velocidad de cambio de k

        function setup() {
            createCanvas(400, 400);
        }

        function draw() {
            background(17);
            translate(width / 2, height / 2 + 50);
            scale(100, -100); // Escalar y voltear para que el corazón esté en posición correcta

            stroke(255, 0, 0);
            strokeWeight(0.02);
            noFill();

            beginShape();
            for (let x = -Math.sqrt(3); x <= Math.sqrt(3); x += 0.01) {
                let y = Math.cbrt(x * x) + 0.7 * Math.sin(k * x) * Math.sqrt(3 - x * x);
                vertex(x, y);
            }
            endShape();

            // Actualizar k y mostrarlo
            k += kSpeed;
            document.getElementById("k-value").innerText = `k = ${k.toFixed(2)}`;
        }
    </script>
</body>
</html>
